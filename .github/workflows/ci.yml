name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: fortyeightid
          POSTGRES_USER: fortyeightid
          POSTGRES_PASSWORD: fortyeightid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fortyeightid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and Test
        run: ./gradlew build
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/fortyeightid
          DATABASE_USERNAME: fortyeightid
          DATABASE_PASSWORD: fortyeightid
          REDIS_HOST: localhost
          REDIS_PORT: 6379
