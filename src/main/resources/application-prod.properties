# ═══════════════════════════════════════════════════════════════════════════
# Production Profile Configuration
# ═══════════════════════════════════════════════════════════════════════════
# This profile is optimized for production with strict security,
# minimal logging, and performance optimizations.
# ═══════════════════════════════════════════════════════════════════════════

# ── Security ──
# Disable Swagger UI in production
springdoc.swagger-ui.enabled=false

# ── Logging ──
# Minimal logging in production
logging.level.root=WARN
logging.level.io.k48.fortyeightid=INFO

# ── Database ──
# Disable SQL logging in production
spring.jpa.show-sql=false

# ── Actuator Security ──
# Restrict actuator endpoints in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never

# ── Server ──
# Production server optimizations
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024