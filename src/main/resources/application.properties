spring.application.name=48ID

# ── Database (PostgreSQL) ──
# Default to localhost:5433 for development (docker-compose)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/fortyeightid}
spring.datasource.username=${DATABASE_USERNAME:fortyeightid}
spring.datasource.password=${DATABASE_PASSWORD:fortyeightid}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Redis ──
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Mail ──
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

fortyeightid.mail.from=${MAIL_FROM:no-reply@48id.k48.io}
fortyeightid.mail.login-url=${MAIL_LOGIN_URL:http://localhost:3000/login}
fortyeightid.mail.activation-url=${MAIL_ACTIVATION_URL:http://localhost:3000/activate-account}
fortyeightid.mail.reset-password-url=${MAIL_RESET_PASSWORD_URL:http://localhost:3000/reset-password}

# ── JWT / Security ──
fortyeightid.jwt.issuer=${JWT_ISSUER:http://localhost:8080}
fortyeightid.jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:900}
fortyeightid.jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:86400}
fortyeightid.jwt.rsa-public-key=${JWT_RSA_PUBLIC_KEY:classpath:keys/public.pem}
fortyeightid.jwt.rsa-private-key=${JWT_RSA_PRIVATE_KEY:classpath:keys/private.pem}

# ── CORS ──
fortyeightid.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Actuator ──
management.endpoints.web.exposure.include=health,info,metrics,modulith
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.info.env.enabled=true

# ── SpringDoc / OpenAPI ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/api/v1/docs
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_ENABLED:true}
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.show-actuator=false
fortyeightid.openapi.servers=${OPENAPI_SERVERS:http://localhost:8080}

# ── Logging ──
logging.level.root=INFO
logging.level.io.k48.fortyeightid=INFO
logging.level.org.springframework.modulith=INFO

# ── Server ──
server.port=${SERVER_PORT:8080}

# ── API ──
fortyeightid.api.prefix=${API_PREFIX:/api/v1}
