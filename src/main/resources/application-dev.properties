# ── Dev Profile ──

# ── Database ──
spring.datasource.url=jdbc:postgresql://localhost:5433/fortyeightid
spring.datasource.username=fortyeightid
spring.datasource.password=fortyeightid

# ── Redis ──
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Logging ──
logging.level.io.k48.fortyeightid=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Suppress Hibernate connection pool info noise (HHH10001005 - metadata shown as undefined/unknown with HikariCP)
logging.level.org.hibernate.orm.connections.pooling=WARN

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.enabled=true
