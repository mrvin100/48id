# ═══════════════════════════════════════════════════════════════════════════
# Development Profile Configuration
# ═══════════════════════════════════════════════════════════════════════════
# This profile is optimized for local development with detailed logging,
# SQL debugging, and development tools enabled.
# ═══════════════════════════════════════════════════════════════════════════

# ── Enhanced Logging for Development ──
logging.level.io.k48.fortyeightid=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Suppress Hibernate connection pool noise
logging.level.org.hibernate.orm.connections.pooling=WARN

# ── Database Debug ──
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── API Documentation ──
# Swagger UI enabled for development
springdoc.swagger-ui.enabled=true
