# ═══════════════════════════════════════════════════════════════════════════
# Test Profile Configuration
# ═══════════════════════════════════════════════════════════════════════════
# This profile is optimized for automated testing with Testcontainers,
# in-memory services, and fast startup times.
# ═══════════════════════════════════════════════════════════════════════════

# ── Database (Testcontainers) ──
# Uses Testcontainers for isolated test database
spring.datasource.url=jdbc:tc:postgresql:17:///fortyeightid
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# ── Database Migration ──
spring.flyway.enabled=true

# ── Redis (Test) ──
# Use different port to avoid conflicts with dev Redis
spring.data.redis.host=localhost
spring.data.redis.port=6370

# ── Email (Mock) ──
# Use mock email service for testing
spring.mail.host=localhost
spring.mail.port=1025

# ── Logging ──
logging.level.io.k48.fortyeightid=DEBUG

# ── API Documentation ──
# Disable Swagger in tests for faster startup
springdoc.swagger-ui.enabled=false
