services:
  postgres:
    image: postgres:17
    container_name: 48id-postgres
    environment:
      POSTGRES_DB: fortyeightid
      POSTGRES_USER: fortyeightid
      POSTGRES_PASSWORD: fortyeightid
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortyeightid"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: 48id-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: 48id-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/fortyeightid
      DATABASE_USERNAME: fortyeightid
      DATABASE_PASSWORD: fortyeightid
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: default
      SPRINGDOC_SWAGGER_ENABLED: "true"
    ports:
      - "8080:8080"

volumes:
  pgdata:
  redisdata:
